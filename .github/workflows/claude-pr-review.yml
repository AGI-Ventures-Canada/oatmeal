name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            ## Review Scope

            **Only review commits from the PR branch, not pre-existing code in main.**

            Use these commands:
            - `git diff origin/${{ github.event.pull_request.base.ref }}..HEAD` - All changes in this PR
            - `git diff origin/${{ github.event.pull_request.base.ref }}..HEAD --stat` - Summary of changes
            - `git log origin/${{ github.event.pull_request.base.ref }}..HEAD --oneline` - Commits in this PR

            ## Effort = PR Size

            Start with `git diff --stat`. Match effort to scope:
            - **Small** (few lines, 1-2 files): Quick review, don't over-investigate
            - **Medium** (new component/feature): Read changed files + immediate dependencies
            - **Large** (architectural): Thorough review

            ## Project Standards (from CLAUDE.md)

            ### Git & Workflow
            - Never push to main directly - must use feature branches
            - Run `pnpm build` before committing to catch TypeScript errors
            - Migration files must pass `supabase db reset` locally before pushing

            ### Code Style
            - **No inline comments** - code should be self-documenting
            - Use Supabase Service Role Key in API endpoints (not RLS policies)
            - pnpm only (flag package-lock.json or yarn.lock)

            ### Database/Migrations
            - Migration files must be self-contained
            - Use `IF NOT EXISTS` in CREATE statements
            - Timestamp format: `YYYYMMDDHHMMSS_description.sql`
            - If schema changes, check if `supabase/seed.sql` needs updates:
              - New NOT NULL columns need seed data
              - New FK constraints need referenced rows
              - Renamed/removed columns must be updated in seed

            ### TypeScript/Next.js
            - Proper typing (no `any` types)
            - Use `@/` path aliases for imports
            - Prefer server components; extract client logic to separate components

            ## Review Focus

            1. **Breaking changes** to existing functionality
            2. **Migration issues** - will this fail on preview branch?
            3. **Seed data** - does seed.sql still work with schema changes?
            4. **Security** - exposed secrets, SQL injection, XSS
            5. **TypeScript** - proper types, no `any`

            ## Response Format

            **Review**: One sentence summary.

            **What it does**: One sentence description.

            ---

            ### What's Good
            Brief positive points (if any).

            ### Issues Found
            - **Critical**: Must fix before merge
            - **Warning**: Should address
            - **Suggestion**: Nice to have

            If no issues: "No issues found."

            ---

            Keep it short. Be direct. Focus on what matters.

            Use `gh pr comment ${{ github.event.pull_request.number }} --body "YOUR_REVIEW"` to post your review.

          claude_args: '--model claude-opus-4-5-20251101 --allowed-tools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"'
