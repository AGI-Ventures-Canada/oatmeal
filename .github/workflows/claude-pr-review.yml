name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            ## Review Scope

            **Only review commits from the PR branch, not pre-existing code in main.**

            Use these commands:
            - `git diff origin/${{ github.event.pull_request.base.ref }}..HEAD` - All changes in this PR
            - `git diff origin/${{ github.event.pull_request.base.ref }}..HEAD --stat` - Summary of changes
            - `git log origin/${{ github.event.pull_request.base.ref }}..HEAD --oneline` - Commits in this PR

            ## Effort = PR Size

            Start with `git diff --stat`. Match effort to scope:
            - **Small** (few lines, 1-2 files): Quick review, don't over-investigate
            - **Medium** (new component/feature): Read changed files + immediate dependencies
            - **Large** (architectural): Thorough review

            ## Project Standards (from CLAUDE.md)

            ### Git & Workflow
            - Never push to main directly - must use feature branches
            - Run `bun run build` before committing to catch TypeScript errors
            - All new code must have accompanying tests (90% coverage target)

            ### Code Style
            - **No inline comments** - code should be self-documenting
            - Use Supabase Service Role Key in API endpoints (not RLS policies)
            - **bun only** - flag package-lock.json, yarn.lock, or pnpm-lock.yaml

            ### Testing
            - All new code must have tests in `__tests__/` directory
            - Run tests with `bun test`

            ### TypeScript/Next.js
            - Proper typing (no `any` types)
            - Use `@/` path aliases for imports
            - Prefer server components; extract client logic to separate components
            - Next.js 16: use proxy.ts (not middleware.ts), await async APIs

            ### CLI Package (`packages/cli/`)
            - CLI is a standalone HTTP client — must NOT import from the main app (`lib/`, `app/`, `components/`)
            - All types are CLI-local in `src/types.ts` — never import from `lib/db/` or `lib/auth/`
            - Commands follow the pattern: `src/commands/<resource>/<action>.ts` exporting `run<Action>(client, args)`
            - Tests live in `__tests__/commands/<resource>.test.ts` and mock `global.fetch`
            - `src/output.ts` formatting functions must use `object` constraint (not `Record<string, unknown>`) for generic types
            - CLI build (`bun cli:build`) must produce `dist/cli.mjs` — verify no server-side imports leak into the bundle
            - `bin/cli.mjs` uses `#!/usr/bin/env node` (not bun) for cross-platform npm distribution

            ## Review Focus

            1. **Breaking changes** to existing functionality
            2. **Missing tests** - new code without accompanying tests
            3. **Security** - exposed secrets, SQL injection, XSS
            4. **TypeScript** - proper types, no `any`
            5. **CLI isolation** - CLI package must not import from main app code

            ## Response Format

            **Review**: One sentence summary.

            **What it does**: One sentence description.

            ---

            ### What's Good
            Brief positive points (if any).

            ### Issues Found
            - **Critical**: Must fix before merge
            - **Warning**: Should address
            - **Suggestion**: Nice to have

            If no issues: "No issues found."

            ---

            Keep it short. Be direct. Focus on what matters.

            Use `gh pr comment ${{ github.event.pull_request.number }} --body "YOUR_REVIEW"` to post your review.

          claude_args: '--model claude-sonnet-4-6 --allowed-tools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"'
