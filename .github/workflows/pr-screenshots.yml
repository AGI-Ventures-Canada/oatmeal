name: PR Screenshots

on:
  deployment_status:

jobs:
  screenshots:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Preview'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      deployments: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.deployment.ref }}

      - name: Find PR and check for frontend changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_REF: ${{ github.event.deployment.ref }}
          DEPLOY_SHA: ${{ github.event.deployment.sha }}
        run: |
          # Try branch name first, fall back to SHA-based PR lookup
          PR_NUMBER=$(gh pr list --head "$DEPLOY_REF" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --state open --json number,headRefOid \
              --jq ".[] | select(.headRefOid == \"${DEPLOY_SHA}\") | .number" | head -1)
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "::debug::No open PR found for ref=${DEPLOY_REF} sha=${DEPLOY_SHA}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          CHANGES=$(git diff --name-only origin/staging...HEAD -- 'app/' 'components/' 'emails/' 2>/dev/null || true)
          if [ -z "$CHANGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install agent-browser
        if: steps.check.outputs.skip != 'true'
        run: |
          npm i -g agent-browser
          agent-browser install

      - name: Authenticate via Clerk sign-in token
        if: steps.check.outputs.skip != 'true'
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_TEST_USER_ID: ${{ secrets.CLERK_TEST_USER_ID }}
        run: |
          if [ -z "$CLERK_SECRET_KEY" ] || [ -z "$CLERK_TEST_USER_ID" ]; then
            echo "CLERK_SECRET_KEY or CLERK_TEST_USER_ID not set — authenticated pages will be skipped"
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SIGN_IN_URL=$(curl -sf -X POST "https://api.clerk.com/v1/sign_in_tokens" \
            -H "Authorization: Bearer ${CLERK_SECRET_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\": \"${CLERK_TEST_USER_ID}\"}" \
            | jq -r '.url // empty')

          if [ -z "$SIGN_IN_URL" ]; then
            echo "Failed to create sign-in token"
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          agent-browser open "$SIGN_IN_URL" >/dev/null 2>&1
          agent-browser wait --load networkidle >/dev/null 2>&1 || true
          agent-browser wait 3000 >/dev/null 2>&1 || true
          echo "authenticated=true" >> "$GITHUB_OUTPUT"
        id: auth

      - name: Capture screenshots
        if: steps.check.outputs.skip != 'true'
        env:
          PREVIEW_URL: ${{ github.event.deployment_status.target_url }}
          AUTHENTICATED: ${{ steps.auth.outputs.authenticated }}
          CHANGES: ${{ steps.check.outputs.changes }}
        run: |
          DIR="/tmp/pr-screenshots"
          mkdir -p "$DIR"

          # Discover an event slug from the preview API (unauthenticated — if the
          # listing endpoint requires auth, this returns empty and event-scoped
          # screenshots are silently skipped)
          EVENT_SLUG=$(curl -sf --max-time 10 "${PREVIEW_URL}/api/hackathons" 2>/dev/null \
            | jq -r 'if type == "array" then .[0].slug elif .data then .data[0].slug else empty end // empty' 2>/dev/null) || true

          capture() {
            local url="$1" name="$2"
            agent-browser open "$url" 2>/dev/null || return 1
            agent-browser wait --load networkidle 2>/dev/null || true
            agent-browser wait 2000 2>/dev/null || true
            agent-browser screenshot --full "$DIR/${name}.png" 2>/dev/null || return 1
          }

          capture "$PREVIEW_URL" "index" || true

          if echo "$CHANGES" | grep -q 'app/(public)/e/' && [ -n "$EVENT_SLUG" ]; then
            capture "${PREVIEW_URL}/e/${EVENT_SLUG}" "e_${EVENT_SLUG}" || true
          fi

          if echo "$CHANGES" | grep -q 'app/(public)/e/\[slug\]/manage' && [ -n "$EVENT_SLUG" ] && [ "$AUTHENTICATED" = "true" ]; then
            capture "${PREVIEW_URL}/e/${EVENT_SLUG}/manage" "e_manage" || true
          fi

          if echo "$CHANGES" | grep -q 'app/(dashboard)/'; then
            capture "${PREVIEW_URL}/hackathons" "hackathons" || true
          fi

      - name: Close browser
        if: always()
        run: agent-browser close >/dev/null 2>&1 || true

      - name: Upload and comment on PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
          DEPLOY_REF: ${{ github.event.deployment.ref }}
        run: |
          REPO="${{ github.repository }}"
          TAG="pr-${PR_NUMBER}-screenshots"
          DIR="/tmp/pr-screenshots"

          shopt -s nullglob
          IMAGES=("$DIR"/*.png "$DIR"/*.jpg)
          shopt -u nullglob
          [ ${#IMAGES[@]} -gt 0 ] || exit 0

          # Create or clean the release (--prerelease so asset URLs resolve)
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "PR #${PR_NUMBER} Screenshots" \
              --notes "Auto-captured screenshots for PR #${PR_NUMBER}" \
              --prerelease
          else
            RELEASE_JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>/dev/null || echo '{}')
            echo "$RELEASE_JSON" | jq -r '.assets[]?.id // empty' 2>/dev/null | while read -r aid; do
              [ -n "$aid" ] && gh api "repos/${REPO}/releases/assets/${aid}" -X DELETE 2>/dev/null || true
            done
          fi

          # Upload assets and build comment via temp file
          BODY_FILE="$DIR/comment.md"
          cat > "$BODY_FILE" <<COMMENT_EOF
          <!-- pr-screenshots -->
          ## Screenshots

          Auto-captured from Vercel preview for \`${DEPLOY_REF}\`.
          COMMENT_EOF

          for img in "${IMAGES[@]}"; do
            filename=$(basename "$img")
            name="${filename%.*}"
            gh release upload "$TAG" "$img" --clobber || continue
            URL="https://github.com/${REPO}/releases/download/${TAG}/${filename}"
            cat >> "$BODY_FILE" <<IMG_EOF

          ### ${name}
          ![${name}](${URL})
          IMG_EOF
          done

          # Strip leading whitespace from YAML indentation
          BODY=$(sed 's/^[[:space:]]*//' "$BODY_FILE")

          # Post or update PR comment (idempotent via HTML marker)
          MARKER="<!-- pr-screenshots -->"
          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)

          BODY_JSON=$(jq -n --arg body "$BODY" '{"body": $body}')

          if [ -n "$EXISTING_ID" ]; then
            echo "$BODY_JSON" | gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -X PATCH --input - 2>/dev/null
          else
            echo "$BODY_JSON" | gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -X POST --input - 2>/dev/null
          fi
