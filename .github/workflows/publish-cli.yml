name: Publish CLI

on:
  push:
    branches: [main]
    tags:
      - 'cli-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for CLI changes since last release
        id: changes
        if: "!startsWith(github.ref, 'refs/tags/cli-v')"
        run: |
          LAST_TAG=$(git tag -l 'cli-v*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, will publish"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- packages/cli/ | head -1)
            if [ -n "$CHANGED" ]; then
              echo "CLI files changed since $LAST_TAG"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "No CLI changes since $LAST_TAG, skipping"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Bump patch version
        if: "!startsWith(github.ref, 'refs/tags/cli-v') && steps.changes.outputs.changed == 'true'"
        id: version
        run: |
          cd packages/cli
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "const p=require('./package.json'); p.version='$NEW_VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW_VERSION"

      - name: Run CLI tests
        if: "startsWith(github.ref, 'refs/tags/cli-v') || steps.changes.outputs.changed == 'true'"
        run: bun test packages/cli/__tests__/

      - name: Type check
        if: "startsWith(github.ref, 'refs/tags/cli-v') || steps.changes.outputs.changed == 'true'"
        run: cd packages/cli && bunx tsc --noEmit

      - name: Build
        if: "startsWith(github.ref, 'refs/tags/cli-v') || steps.changes.outputs.changed == 'true'"
        run: cd packages/cli && bun run build

      - uses: actions/setup-node@v4
        if: "startsWith(github.ref, 'refs/tags/cli-v') || steps.changes.outputs.changed == 'true'"
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        if: "startsWith(github.ref, 'refs/tags/cli-v') || steps.changes.outputs.changed == 'true'"
        run: cd packages/cli && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version for tag-triggered runs
        if: "startsWith(github.ref, 'refs/tags/cli-v')"
        id: tag-version
        run: echo "version=${GITHUB_REF#refs/tags/cli-v}" >> "$GITHUB_OUTPUT"

      - name: Tag release and push version bump
        if: "!startsWith(github.ref, 'refs/tags/cli-v') && steps.changes.outputs.changed == 'true'"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git commit -m "chore(cli): bump version to ${{ steps.version.outputs.version }}"
          git tag "cli-v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        if: "startsWith(github.ref, 'refs/tags/cli-v') || steps.changes.outputs.changed == 'true'"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version || steps.tag-version.outputs.version }}
        run: |
          gh release create "cli-v${VERSION}" \
            --title "CLI v${VERSION}" \
            --generate-notes \
            --notes-start-tag "$(git tag -l 'cli-v*' --sort=-v:refname | sed -n '2p')"
