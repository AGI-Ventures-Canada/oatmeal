name: CI

on:
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, staging]

jobs:
  lint:
    name: Lint
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun lint

  test:
    name: Tests & Type Check
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript check
        run: |
          echo "::group::TypeScript Errors"
          bunx tsc --noEmit 2>&1 | head -100 || true
          echo "::endgroup::"
          echo "::warning::TypeScript check completed (errors shown above if any)"

      - name: Run tests
        run: bun run test:all

      - name: Run CLI tests
        run: bun run cli:test

      - name: Install CLI dependencies
        run: cd packages/cli && bun install --frozen-lockfile

      - name: CLI type check
        run: cd packages/cli && bunx tsc --noEmit

      - name: CLI build
        run: bun cli:build
